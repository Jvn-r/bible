version: "3.9"

services:
  backend:
    build: ./backend
    container_name: bible_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./data:/app/data
    environment:
      - DB_PATH=/app/data/bible.db
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: bible_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    restart: unless-stopped